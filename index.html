/* Interview Mode Selector */
.mode-selector {
  display: none;
  gap: 10px;
  margin-top: 14px;
  justify-content: center;
}
.mode-selector.visible { display: flex; }
.mode-opt {
  flex: 1;
  max-width: 160px;
  padding: 10px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  font-family: 'Segoe UI', sans-serif;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.mode-opt:hover { border-color: rgba(255,255,255,0.15); color: #fff; }
.mode-opt.active.friendly {
  background: rgba(32,201,166,0.1);
  border-color: rgba(32,201,166,0.4);
  color: #20c9a6;
}
.mode-opt.active.ruthless {
  background: rgba(255,77,77,0.1);
  border-color: rgba(255,77,77,0.4);
  color: #ff4d4d;
}

// Add this inside setMode() function after the existing code:
  document.getElementById('mode-selector').classList.toggle('visible', mode === 'voice');

// Add this as a NEW function:
function setInterviewMode(mode) {
  sessionStorage.setItem('interviewMode', mode);
  document.querySelectorAll('.mode-opt').forEach(b => {
    b.classList.remove('active');
  });
  document.querySelector('.mode-opt.' + mode).classList.add('active');
}

// Also set default mode on load — add this at the bottom of script:
sessionStorage.setItem('interviewMode', 'friendly'); // default
