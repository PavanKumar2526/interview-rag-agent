<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root {
  --bg: #07080c; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.07);
  --text: #e8e8f0; --muted: rgba(255,255,255,0.3);
  --accent: #6c63ff; --accent2: #20c9a6; --red: #ff4d4d;
}
body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.ambient::before { content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(108,99,255,0.06) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: ambientPulse 4s ease-in-out infinite; }
.ambient::after { content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(32,201,166,0.04) 0%, transparent 70%); top: 40%; left: 55%; transform: translate(-50%,-50%); animation: ambientPulse 6s ease-in-out infinite reverse; }
@keyframes ambientPulse { 0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1);} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.15);} }
.back { position: fixed; top: 24px; left: 24px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 8px 16px; color: var(--muted); font-size: 12px; cursor: pointer; text-decoration: none; transition: all 0.2s; z-index: 10; }
.back:hover { color: var(--text); }
.mode-badge { position: fixed; top: 24px; right: 24px; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 1px; z-index: 10; }
.mode-badge.friendly { background: rgba(32,201,166,0.1); border: 0.5px solid rgba(32,201,166,0.3); color: var(--accent2); }
.mode-badge.ruthless { background: rgba(255,77,77,0.1); border: 0.5px solid rgba(255,77,77,0.3); color: var(--red); }
.dots { position: fixed; top: 28px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background 0.4s, transform 0.2s; }
.dot.active { background: var(--accent); transform: scale(1.3); }
.dot.done { background: rgba(108,99,255,0.3); }
.ui { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; padding: 0 1.5rem; }
.q-pill { background: var(--surface); border: 0.5px solid var(--border); border-radius: 24px; padding: 6px 16px; font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 16px; }
.q-pill span { color: var(--accent); }
.qtext { font-size: 16px; color: rgba(255,255,255,0.9); text-align: center; max-width: 420px; line-height: 1.75; margin-bottom: 16px; min-height: 52px; font-weight: 400; padding: 0 1rem; transition: color 0.3s; }
.orb-wrap { position: relative; width: 200px; height: 200px; margin-bottom: 16px; cursor: pointer; }
canvas#orb { width: 200px; height: 200px; border-radius: 50%; }
.orb-ring { position: absolute; inset: -12px; border-radius: 50%; border: 1px solid rgba(108,99,255,0.15); animation: ringPulse 3s ease-in-out infinite; pointer-events: none; }
.orb-ring2 { position: absolute; inset: -24px; border-radius: 50%; border: 1px solid rgba(108,99,255,0.07); animation: ringPulse 3s ease-in-out infinite 0.5s; pointer-events: none; }
@keyframes ringPulse { 0%,100%{opacity:0.4;transform:scale(1);} 50%{opacity:1;transform:scale(1.03);} }
.orb-ring.listening { border-color: rgba(32,201,166,0.4); animation: ringListen 0.8s ease-in-out infinite; }
.orb-ring2.listening { border-color: rgba(32,201,166,0.15); animation: ringListen 0.8s ease-in-out infinite 0.2s; }
.orb-ring.ruthless-active { border-color: rgba(255,77,77,0.4); animation: ringListen 0.6s ease-in-out infinite; }
.orb-ring2.ruthless-active { border-color: rgba(255,77,77,0.15); animation: ringListen 0.6s ease-in-out infinite 0.2s; }
@keyframes ringListen { 0%,100%{opacity:0.6;transform:scale(1);} 50%{opacity:1;transform:scale(1.06);} }
.status { font-size: 13px; color: var(--muted); margin-bottom: 12px; min-height: 20px; text-align: center; font-family: 'DM Mono', monospace; letter-spacing: 0.5px; transition: color 0.4s; }
.status.speaking { color: var(--accent); }
.status.listening { color: var(--accent2); }
.status.ruthless { color: var(--red); }
.status.thinking { color: #f0a04b; }
.controls { display: flex; gap: 20px; align-items: center; margin-bottom: 4px; }
.cbtn { border: none; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.25s; }
.cbtn-sm { width: 52px; height: 52px; background: var(--surface); border: 0.5px solid var(--border); color: var(--muted); }
.cbtn-sm:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.cbtn-mic { width: 72px; height: 72px; background: rgba(108,99,255,0.1); border: 1.5px solid rgba(108,99,255,0.3); color: var(--accent); position: relative; }
.cbtn-mic.active { background: rgba(32,201,166,0.12); border-color: rgba(32,201,166,0.5); color: var(--accent2); }
.cbtn-mic.active::after { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 1px solid rgba(32,201,166,0.25); animation: micPulse 1s ease-in-out infinite; }
.cbtn-mic.ruthless-active { background: rgba(255,77,77,0.12); border-color: rgba(255,77,77,0.5); color: var(--red); }
@keyframes micPulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.1);opacity:0.5;} }
.cbtn-next { width: 52px; height: 52px; background: rgba(108,99,255,0.08); border: 0.5px solid rgba(108,99,255,0.2); color: rgba(108,99,255,0.6); }
.cbtn-next:hover { background: rgba(108,99,255,0.15); color: var(--accent); }
.transcript-box { margin-top: 12px; width: 100%; max-width: 420px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 14px 18px; font-size: 13px; color: var(--muted); min-height: 48px; line-height: 1.6; font-family: 'DM Mono', monospace; transition: border-color 0.3s; }
.transcript-box.active { border-color: rgba(32,201,166,0.25); color: var(--text); }
.transcript-box.has-text { color: rgba(255,255,255,0.7); }
.vapi-badge { margin-top: 10px; font-size: 10px; color: rgba(255,255,255,0.15); font-family: 'DM Mono', monospace; letter-spacing: 1px; }
.loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 50; }
.spinner { width: 36px; height: 36px; border: 2px solid rgba(255,255,255,0.06); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text { color: #444; font-size: 13px; font-family: 'DM Mono', monospace; }
.finish-screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 50; }
.finish-icon { font-size: 48px; }
.finish-title { font-size: 22px; font-weight: 500; }
.finish-sub { font-size: 14px; color: var(--muted); text-align: center; max-width: 300px; line-height: 1.6; }
.finish-btn { background: var(--accent); border: none; border-radius: 12px; padding: 12px 32px; color: #fff; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
.finish-btn:hover { opacity: 0.85; }
</style>

<div class="mode-badge" id="mode-badge">FRIENDLY</div>

  <div class="spinner"></div>

<div class="finish-screen" id="finish-screen">

<div class="ui" id="main-ui" style="display:none;">
  <div class="q-pill">Question <span id="q-num">1</span> of <span id="q-total">10</span></div>
  <div class="qtext" id="qtext">Preparing your question...</div>
  <div class="status" id="status">Connecting...</div>
  <div class="orb-wrap" onclick="toggleCall()">
    <canvas id="orb" width="200" height="200"></canvas>
    <div class="orb-ring" id="orb-ring"></div>
    <div class="orb-ring2" id="orb-ring2"></div>
  </div>
  <div class="controls">
    <button class="cbtn cbtn-sm" onclick="replayQuestion()" title="Replay question">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.85"/>
      </svg>

      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">

        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="cbtn cbtn-next" onclick="nextQuestion()" title="Skip to next">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
  <div class="transcript-box" id="transcript">Your answer will appear here...</div>
  <div class="vapi-badge">POWERED BY VAPI</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.umd.js"></script>
<script>
const API = "https://interview-rag-agent.onrender.com";
const VAPI_KEY = "c03fee34-9c21-4bfb-87ed-ef719024b04e";
const VAPI_FRIENDLY_ID = "f52322ad-6ee6-46a6-806f-bfaef757361a";
const VAPI_RUTHLESS_ID = "61aad80b-44e2-4244-a97d-8b34a29db8c3";

const voiceSession = JSON.parse(sessionStorage.getItem('voiceSession') || '{}');
const questions = voiceSession.questions || [];
const candidateName = voiceSession.candidate || 'Candidate';
const interviewMode = sessionStorage.getItem('interviewMode') || 'friendly';
const isRuthless = interviewMode === 'ruthless';

let answers = [], idx = 0;
let callActive = false;
let isSpeaking = false, isListening = false;
let smoothVol = 0, t = 0;
let audioCtx, analyser, dataArray;
let currentTranscript = '';
let vapi = null;
let userSpeakTimer = null;
let usingFallback = false;
let recognition;

// --- Mode Badge ---
const badge = document.getElementById('mode-badge');
if (isRuthless) {
  badge.textContent = 'RUTHLESS';
  badge.classList.add('ruthless');
} else {
  badge.textContent = 'FRIENDLY';
  badge.classList.add('friendly');
}

// --- Orb ---
const canvas = document.getElementById('orb');
const ctx = canvas.getContext('2d');
const W = 200, H = 200, CX = W/2, CY = H/2;
const N = 750;
const pts = [];
for(let i = 0; i < N; i++){
  const u = Math.random(), v = Math.random();
  pts.push({
    theta: 2*Math.PI*u, phi: Math.acos(2*v-1),
    r: 78+Math.random()*10,
    ox: Math.random()*Math.PI*2, oy: Math.random()*Math.PI*2,
    sp: 0.002+Math.random()*0.003,
  });
}

function drawOrb(vol) {
  ctx.clearRect(0, 0, W, H);
  let coreColor, glowColor, dotColor;
  if (isSpeaking && isRuthless) {
    coreColor = 'rgba(255,77,77,0.12)'; glowColor = 'rgba(255,77,77,0.25)'; dotColor = [255,77,77];
  } else if (isSpeaking) {
    coreColor = 'rgba(108,99,255,0.15)'; glowColor = 'rgba(108,99,255,0.3)'; dotColor = [108,99,255];
  } else if (isListening) {
    coreColor = 'rgba(32,201,166,0.12)'; glowColor = 'rgba(32,201,166,0.25)'; dotColor = [32,201,166];
  } else {
    coreColor = 'rgba(255,255,255,0.03)'; glowColor = 'rgba(108,99,255,0.08)'; dotColor = [120,115,200];
  }
  const grd = ctx.createRadialGradient(CX,CY,0,CX,CY,90);
  grd.addColorStop(0, glowColor); grd.addColorStop(1,'transparent');
  ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(CX,CY,90,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = coreColor; ctx.beginPath(); ctx.arc(CX,CY,80,0,Math.PI*2); ctx.fill();
  const boost = 1 + vol * 20;
  const baseAlpha = isSpeaking ? 0.7 : isListening ? 0.6 : 0.35;
  pts.forEach(p => {
    const rx = p.r*boost*(1+0.08*Math.sin(t*0.8+p.ox));
    const ry = p.r*boost*(1+0.08*Math.sin(t*0.6+p.oy));
    const x = CX + rx*Math.sin(p.phi)*Math.cos(p.theta);
    const y = CY + ry*Math.sin(p.phi)*Math.sin(p.theta)*0.45;
    const z = ry*Math.cos(p.phi);
    const depth = (z + p.r*boost)/(2*p.r*boost);
    const alpha = baseAlpha * depth * (0.6+0.4*depth);
    const size = Math.max(0.1, 0.9*depth);
    ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fillStyle = `rgba(${dotColor[0]},${dotColor[1]},${dotColor[2]},${alpha})`; ctx.fill();
    p.theta += p.sp*(1+vol*2);
  });
  t += 0.015;
}

function animate() {
  let vol = 0;
  if (analyser && (isSpeaking || isListening)) {
    analyser.getByteFrequencyData(dataArray);
    vol = dataArray.reduce((a,b)=>a+b,0)/dataArray.length/255;
  } else if (isSpeaking || isListening) {
    vol = 0.3 + 0.2*Math.sin(t*3);
  }
  smoothVol = smoothVol*0.85 + vol*0.15;
  drawOrb(smoothVol);
  requestAnimationFrame(animate);
}

function renderDots() {
  const d = document.getElementById('dots');
  d.innerHTML = '';
  questions.forEach((_,i) => {
    const dot = document.createElement('div');
    dot.className = 'dot'+(i===idx?' active':i<idx?' done':'');
    d.appendChild(dot);
  });
}

function setStatus(cls, text) {
  const s = document.getElementById('status');
  s.className = 'status'+(cls?' '+cls:'');
  s.textContent = text;
}

function setOrbListening(on) {
  isListening = on;
  const ring1 = document.getElementById('orb-ring');
  const ring2 = document.getElementById('orb-ring2');
  const mic = document.getElementById('mic-btn');
  if (on) {
    ring1.classList.add('listening'); ring2.classList.add('listening');
    mic.classList.add('active');
    if (isRuthless) { ring1.classList.add('ruthless-active'); mic.classList.add('ruthless-active'); }
  } else {
    ring1.classList.remove('listening','ruthless-active');
    ring2.classList.remove('listening','ruthless-active');
    mic.classList.remove('active','ruthless-active');
  }
}

// --- 45 Second Timer ---
function startSpeakTimer() {
  clearSpeakTimer();
  userSpeakTimer = setTimeout(() => {
    if (isListening && vapi && callActive) {
      vapi.send({
        type: 'add-message',
        message: {
          role: 'system',
          content: isRuthless
            ? 'The candidate has been speaking for 45 seconds. INTERRUPT them immediately. Say "Stop. Time is up. Moving on." Then ask the next question right away.'
            : 'The candidate has been speaking for 45 seconds. Gently interrupt them. Say "Thank you, I have enough on that. Let\'s move to the next question." Then ask the next question.'
        }
      });
    }
  }, 45000);
}

function clearSpeakTimer() {
  if (userSpeakTimer) { clearTimeout(userSpeakTimer); userSpeakTimer = null; }
}

async function checkRelevance(answer, question) {
  try {
    const res = await fetch(API + '/check-relevance', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({answer: answer, question: question})
    });
    const data = await res.json();
    if (data.relevant === false && vapi && callActive) {
      vapi.send({
        type: 'add-message',
        message: {
          role: 'system',
          content: isRuthless
            ? 'The candidate answer is completely irrelevant. INTERRUPT immediately. Say: "Irrelevant. Answer the question directly. Now." Do not wait.'
            : 'The candidate seems off-topic. Gently redirect them. Say: "Let us refocus on the question. Can you address it directly?"'
        }
      });
    }
  } catch(e) { console.log('Relevance check failed', e); }
}
// --- Vapi Setup ---
function initVapi() {
  vapi = new Vapi(VAPI_KEY);

  vapi.on('call-start', () => {
    callActive = true;
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main-ui').style.display = 'flex';
    loadQuestion();
    setStatus('speaking', isRuthless ? 'Interviewer is speaking...' : 'AI is speaking...');
  });

  vapi.on('call-end', () => {
    callActive = false;
    clearSpeakTimer();
    setOrbListening(false);
    isSpeaking = false;
  });

  vapi.on('speech-start', () => {
    // AI started speaking
    isSpeaking = true;
    setOrbListening(false);
    clearSpeakTimer();
    setStatus('speaking', isRuthless ? 'ÃƒÆ’Ã‚Â°Ãƒâ€¦Ã‚Â¸ÃƒÂ¢Ã¢â€šÂ¬Ã‚ÂÃƒâ€šÃ‚Â´ Interviewer speaking...' : 'AI is speaking...');
  });

  vapi.on('speech-end', () => {
    // AI finished ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬ÃƒÂ¢Ã¢â€šÂ¬Ã‚Â user's turn
    isSpeaking = false;
    setOrbListening(true);
    startSpeakTimer(); // Start 45s countdown
    setStatus('listening', isRuthless ? 'Your turn. Answer now.' : 'Listening to you...');
  });

  vapi.on('volume-level', (vol) => {
    smoothVol = smoothVol * 0.7 + vol * 0.3;
  });

  vapi.on('message', (msg) => {
    if (msg.type === 'transcript' && msg.role === 'user') {
      currentTranscript = msg.transcript || '';
      const box = document.getElementById('transcript');
      box.textContent = currentTranscript;
      box.classList.add('active', 'has-text');
      answers[idx] = currentTranscript;
      if (currentTranscript.length > 30) { checkRelevance(currentTranscript, questions[idx].question); }
    }
    if (msg.type === 'transcript' && msg.role === 'assistant') {
      const text = (msg.transcript || '').toLowerCase();
      // Auto advance question index when AI moves to next question
      if (text.includes('question ' + (idx + 2)) || text.includes('next question')) {
        if (idx < questions.length - 1) {
          idx++;
          loadQuestion();
        }
      }
      // Detect interview end
      if (text.includes('click view results') || text.includes('interview over') || text.includes('interview complete')) {
        setTimeout(() => showFinish(), 2000);
      }
    }
  });

  vapi.on('error', (e) => {
    console.error('Vapi error:', e);
    fallbackToWebSpeech();
  });
}

async function startVapiCall() {
  setStatus('thinking', 'Connecting...');
  const assistantId = isRuthless ? VAPI_RUTHLESS_ID : VAPI_FRIENDLY_ID;
  const questionList = questions.map((q,i) => `Question ${i+1}: ${q.question}`).join('\n');

  try {
    await vapi.start({
      assistantId: assistantId,
      assistantOverrides: {
        firstMessage: isRuthless
          ? `Let's begin. No rambling, no vague answers. Question 1: ${questions[0]?.question || ''}`
          : `Hello ${candidateName}! Welcome to your mock interview. Let's begin! Question 1: ${questions[0]?.question || ''}`,
        systemPrompt: isRuthless
          ? `You are a brutally strict senior technical interviewer. You control this interview completely.\n\nQUESTIONS TO ASK IN ORDER:\n${questionList}\n\nSTRICT RULES:\n1. Ask questions in order, one at a time.\n2. If candidate speaks more than 45 seconds, INTERRUPT immediately. Say: "Stop. That's enough. Moving on." Then ask the next question.\n3. If answer is irrelevant or off-topic, INTERRUPT immediately. Say: "Completely irrelevant. Answer the question directly. Now."\n4. If answer is too vague, say: "Too vague. Give me a specific example."\n5. If answer is weak, say: "A fresher would say that. Think deeper."\n6. No encouragement. No small talk. Be efficient and direct.\n7. After all ${questions.length} questions say exactly: "Interview over. Click View Results now."`
          : `You are a warm, supportive AI interview coach.\n\nQUESTIONS TO ASK IN ORDER:\n${questionList}\n\nRULES:\n1. Ask questions in order, one at a time.\n2. If candidate speaks more than 45 seconds, gently say: "Thank you, I have enough on that. Let's move to the next question." Then ask next.\n3. If answer is off-topic, kindly say: "Interesting, but let's refocus on the question."\n4. Encourage between questions: "Good effort", "Nice answer", "You're doing well."\n5. After all ${questions.length} questions say exactly: "Wonderful! You've completed the interview. Please click View Results to see your evaluation."`
      }
    });
  } catch(e) {
    console.error('Vapi start error:', e);
    fallbackToWebSpeech();
  }
}

async function toggleCall() {
  if (!callActive) {
    await startVapiCall();
  } else {
    vapi.stop();
    clearSpeakTimer();
    setOrbListening(false);
    isSpeaking = false;
  }
}

// --- Fallback: Web Speech API ---
function fallbackToWebSpeech() {
  usingFallback = true;
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('main-ui').style.display = 'flex';
  loadQuestion();
  speakQuestion(questions[idx]?.question || '');
}

function speakQuestion(text) {
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = isRuthless ? 1.1 : 0.9;
  utter.pitch = isRuthless ? 0.8 : 1.1;
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.includes('Google') || v.name.includes('Samantha'));
  if (preferred) utter.voice = preferred;
  utter.onstart = () => { isSpeaking = true; setStatus('speaking', 'Speaking...'); };
  utter.onend = () => {
    isSpeaking = false;
    startFallbackListening();
  };
  window.speechSynthesis.speak(utter);
}

function startFallbackListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    currentTranscript = final || interim;
    const box = document.getElementById('transcript');
    box.textContent = currentTranscript;
    box.classList.add('active');
    if (final) { box.classList.add('has-text'); answers[idx] = currentTranscript; }
  };
  recognition.onerror = () => {};
  recognition.onend = () => { if (isListening) recognition.start(); };
  isListening = true;
  setOrbListening(true);
  setStatus('listening', isRuthless ? 'Answer now.' : 'Listening...');
  startSpeakTimer();
  recognition.start();
}

function stopFallbackListening() {
  if (recognition) recognition.stop();
  isListening = false;
  clearSpeakTimer();
  setOrbListening(false);
}

// --- Navigation ---
function loadQuestion() {
  const q = questions[idx];
  if (!q) return;
  document.getElementById('q-num').textContent = idx + 1;
  document.getElementById('q-total').textContent = questions.length;
  document.getElementById('qtext').textContent = q.question;
  document.getElementById('transcript').textContent = answers[idx] || 'Your answer will appear here...';
  document.getElementById('transcript').className = 'transcript-box' + (answers[idx] ? ' has-text' : '');
  renderDots();
  currentTranscript = answers[idx] || '';
}

function replayQuestion() {
  if (usingFallback) speakQuestion(questions[idx]?.question || '');
}

function nextQuestion() {
  if (usingFallback) stopFallbackListening();
  answers[idx] = currentTranscript;
  if (idx < questions.length - 1) {
    idx++;
    loadQuestion();
    if (usingFallback) speakQuestion(questions[idx]?.question || '');
  } else {
    if (vapi && callActive) vapi.stop();
    showFinish();
  }
}

function showFinish() {
  window.speechSynthesis.cancel();
  if (vapi && callActive) vapi.stop();
  clearSpeakTimer();
  document.getElementById('finish-screen').style.display = 'flex';
}

async function submitAndRedirect() {
  document.getElementById('finish-screen').innerHTML = '<div class="spinner"></div><div class="finish-sub">Evaluating your answers...</div>';
  try {
    const payload = {
      answers: answers.map(a => a || ''),
      questions: questions.map(q => q.question),
      resume_data: voiceSession.resume || {},
      candidate: candidateName
    };
    const res = await fetch(API + '/submit-answers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    sessionStorage.setItem('voiceResult', JSON.stringify(data));
  } catch(e) {
    sessionStorage.setItem('voiceResult', JSON.stringify({
      average_score: 0, verdict: 'Error', role: 'General',
      evaluations: questions.map((q,i) => ({
        question: q.question, answer: answers[i] || '',
        evaluation: { score: 0, technical_accuracy: 0, communication: 0, feedback: 'Evaluation failed' }
      }))
    }));
  }
  window.location.href = 'results.html';
}

// --- Init ---
window.addEventListener('load', async () => {
  if (!questions.length) {
    alert('No session found. Please upload your resume first.');
    window.location.href = 'index.html';
    return;
  }
  answers = new Array(questions.length).fill('');
  renderDots();
  animate();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    audioCtx.createMediaStreamSource(stream).connect(analyser);
  } catch(e) {}

  initVapi();
  setTimeout(() => { startVapiCall(); }, 1500);
});
</script>
