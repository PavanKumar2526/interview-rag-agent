<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Interview Coach — Voice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;font-family:'Segoe UI',sans-serif;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.back{position:fixed;top:20px;left:20px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);border-radius:20px;padding:8px 16px;color:#555;font-size:12px;cursor:pointer;text-decoration:none;}
.dots{position:fixed;top:24px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.12);transition:background 0.3s;}
.dot.active{background:#9D96E8;}
.dot.done{background:rgba(127,119,221,0.35);}
.ui{display:flex;flex-direction:column;align-items:center;gap:0;width:100%;padding:0 1rem;}
.q-pill{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.08);border-radius:24px;padding:8px 18px;font-size:11px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:40px;}
.q-pill span{color:#9D96E8;}
.orb-wrap{margin-bottom:36px;}
.status{font-size:15px;color:#555;margin-bottom:14px;min-height:22px;text-align:center;transition:color 0.4s;}
.status.listening{color:#20c9a6;}
.status.done{color:#9D96E8;}
.qtext{font-size:14px;color:rgba(255,255,255,0.35);text-align:center;max-width:380px;line-height:1.7;margin-bottom:48px;min-height:46px;}
.controls{display:flex;gap:20px;align-items:center;}
.cbtn{border:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.cbtn-sm{width:52px;height:52px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);}
.cbtn-mic{width:68px;height:68px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);}
.cbtn-mic.active{background:rgba(32,201,166,0.14);border-color:rgba(32,201,166,0.5);}
.cbtn-next{width:52px;height:52px;background:rgba(127,119,221,0.1);border:0.5px solid rgba(127,119,221,0.25);}
.loading-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50;}
.spinner{width:40px;height:40px;border:2px solid #1a1a1a;border-top-color:#7F77DD;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:#444;font-size:13px;}
</style>
</head>
<body>

<a class="back" href="index.html">← Back</a>
<div class="dots" id="dots"></div>

<div class="loading-screen" id="loader">
  <div class="spinner"></div>
  <div class="loading-text" id="loader-text">Preparing your interview...</div>
</div>

<div class="ui" id="main-ui" style="display:none;">
  <div class="q-pill">Question <span id="qnum">1</span> of <span id="qtotal">10</span></div>

  <div class="orb-wrap">
    <canvas id="orb" width="220" height="220"></canvas>
  </div>

  <p class="status" id="status">Click mic to answer</p>
  <p class="qtext" id="qtext"></p>

  <div class="controls">
    <button class="cbtn cbtn-sm" onclick="endInterview()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="cbtn cbtn-mic" id="micbtn" onclick="toggleMic()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
    </button>
    <button class="cbtn cbtn-next" onclick="nextQuestion()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9D96E8" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<script>
const API = "https://interview-rag-agent.onrender.com";
let questions = [], answers = [], idx = 0;
let audioCtx, analyser, micSource, dataArray;
let listening = false, smoothVol = 0, t = 0;
let mediaRecorder, audioChunks = [];

// ── Orb ──
const canvas = document.getElementById('orb');
const ctx = canvas.getContext('2d');
const W=220,H=220,CX=W/2,CY=H/2;
const N=750;
const pts=[];
for(let i=0;i<N;i++){
  const u=Math.random(),v=Math.random();
  pts.push({
    theta:2*Math.PI*u,
    phi:Math.acos(2*v-1),
    r:78+Math.random()*10,
    ox:Math.random()*Math.PI*2,
    oy:Math.random()*Math.PI*2,
    sp:0.002+Math.random()*0.003,
    sz:0.35+Math.random()*1.1,
    alpha:0.15+Math.random()*0.5
  });
}

function getMicVol(){
  if(!analyser)return 0;
  analyser.getByteFrequencyData(dataArray);
  let s=0;for(let i=0;i<dataArray.length;i++)s+=dataArray[i];
  return s/dataArray.length/255;
}

function drawOrb(){
  requestAnimationFrame(drawOrb);
  ctx.clearRect(0,0,W,H);
  t+=0.014;
  if(listening)smoothVol+=(getMicVol()-smoothVol)*0.18;
  else smoothVol+=(0-smoothVol)*0.08;
  const breathe=1+Math.sin(t*0.85)*0.022;
  const voice=1+smoothVol*2.8;
  const scale=breathe*voice;
  const sorted=[...pts].sort((a,b)=>a.r*Math.cos(a.phi)-b.r*Math.cos(b.phi));
  sorted.forEach(p=>{
    p.ox+=p.sp*0.8;p.oy+=p.sp;
    const noise=2.5+smoothVol*22;
    const nr=(p.r+Math.sin(p.ox)*noise+Math.cos(p.oy)*noise*0.6)*scale;
    const x=CX+nr*Math.sin(p.phi)*Math.cos(p.theta);
    const y=CY+nr*Math.sin(p.phi)*Math.sin(p.theta)*0.93;
    const z=nr*Math.cos(p.phi);
    const zn=(z+100)/200;
    const a=Math.min(p.alpha*(0.25+zn*0.75)*(1+smoothVol*1.2),0.92);
    const sz=Math.min(p.sz*(0.35+zn*0.85)*(1+smoothVol*1.8),3.2);
    ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);
    if(listening){
      const gb=Math.floor(150+zn*80+smoothVol*60);
      ctx.fillStyle=`rgba(10,${gb},140,${a})`;
    } else {
      const b=Math.floor(110+zn*100);
      ctx.fillStyle=`rgba(${b},${b},${b},${a})`;
    }
    ctx.fill();
  });
}
drawOrb();

// ── Session Load ──
window.onload = async () => {
  const stored = sessionStorage.getItem('voiceSession');
  if(stored){
    const data = JSON.parse(stored);
    questions = data.questions || [];
  } else {
    document.getElementById('loader-text').textContent = 'No session. Go back and upload resume.';
    return;
  }
  answers = new Array(questions.length).fill('');
  document.getElementById('loader').style.display = 'none';
  document.getElementById('main-ui').style.display = 'flex';
  renderDots();
  showQ();
};

function renderDots(){
  const el=document.getElementById('dots');
  el.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.id='dot-'+i;
    el.appendChild(d);
  });
}

function showQ(){
  const q=questions[idx];
  document.getElementById('qnum').textContent=idx+1;
  document.getElementById('qtotal').textContent=questions.length;
  document.getElementById('qtext').textContent=q?q.question:'';
  document.getElementById('status').textContent='Click mic to answer';
  document.getElementById('status').className='status';
  document.getElementById('micbtn').classList.remove('active');
  questions.forEach((_,i)=>{
    const d=document.getElementById('dot-'+i);
    if(d)d.className='dot'+(i<idx?' done':i===idx?' active':'');
  });
}

async function toggleMic(){
  if(listening){stopMic();}
  else{await startMic();}
}

async function startMic(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=256;
    analyser.smoothingTimeConstant=0.75;
    dataArray=new Uint8Array(analyser.frequencyBinCount);
    micSource=audioCtx.createMediaStreamSource(stream);
    micSource.connect(analyser);
    mediaRecorder=new MediaRecorder(stream);
    audioChunks=[];
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.start();
    listening=true;
    document.getElementById('micbtn').classList.add('active');
    document.getElementById('status').textContent='Listening...';
    document.getElementById('status').className='status listening';
  }catch(e){
    document.getElementById('status').textContent='Mic access denied — type answer below';
    const ans=prompt('Type your answer:');
    if(ans){answers[idx]=ans;document.getElementById('status').textContent='Answer saved ✓';}
  }
}

function stopMic(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive'){
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
  }
  if(micSource){micSource.disconnect();micSource=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  analyser=null;
  listening=false;
  answers[idx]='[Voice answer '+(idx+1)+']';
  document.getElementById('micbtn').classList.remove('active');
  document.getElementById('status').textContent='Answer captured ✓  — tap Next';
  document.getElementById('status').className='status done';
}

function nextQuestion(){
  if(listening)stopMic();
  if(idx<questions.length-1){idx++;showQ();}
  else{submitAll();}
}

async function submitAll(){
  document.getElementById('status').textContent='Evaluating your answers...';
  document.getElementById('qtext').textContent='AI is scoring your performance. Please wait.';
  const finalAnswers=answers.map((a,i)=>a||'No answer provided for question '+(i+1));
  try{
    const res=await fetch(API+'/submit-answers',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({answers:finalAnswers})
    });
    const data=await res.json();
    sessionStorage.setItem('voiceResult',JSON.stringify(data));
    window.location.href='results.html';
  }catch(e){
    document.getElementById('status').textContent='Error submitting. Try again.';
  }
}

function endInterview(){
  if(confirm('End interview and go back to home?'))window.location.href='index.html';
}
</script>
</body>
</html>
